[gcode_macro LUBRICATE]
description: Lubrication routine for the machine
gcode:
    {% set percentage = params.PERCENT|default(100)|int %}
    {% set repetitions = params.REPETITIONS|default(3)|int %}
    {% set max_xy = printer.configfile.settings.printer.max_velocity|float * 60 %}
    {% set max_z = printer.configfile.settings.printer.max_z_velocity|float * 60 %}
    {% set xy_speed = (max_xy * percentage / 100)|int %}
    {% set z_speed = (max_z * percentage / 100)|int %}
    {% set x_min = printer.toolhead.axis_minimum.x|float + 1 %}
    {% set x_max = printer.toolhead.axis_maximum.x|float - 1 %}
    {% set y_min = printer.toolhead.axis_minimum.y|float + 1 %}
    {% set y_max = printer.toolhead.axis_maximum.y|float - 1 %}
    {% set z_min = 5 %}
    {% set z_max = printer.toolhead.axis_maximum.z|float - 1 %}
    SAVE_GCODE_STATE NAME=LUBRICATE_STATE
    M117 Lubrication: {repetitions} cycles at {percentage}%
    M117 XY:{xy_speed} Z:{z_speed}
    {% for i in range(repetitions) %}
        {% if i == 0 %}
            {% if printer.toolhead.homed_axes != "xyz" %}
                M117 Homing...
                G28
            {% endif %}
            G0 X{x_min} Y{y_min} Z{z_min} F{xy_speed}
        {% endif %}
        M117 Cycle {i+1}/{repetitions} - X
        G0 X{x_max} F{xy_speed}
        M117 Cycle {i+1}/{repetitions} - Y
        G0 Y{y_max} F{xy_speed}
        M117 Cycle {i+1}/{repetitions} - Z
        G0 Z{z_max} F{z_speed}
        M117 Cycle {i+1}/{repetitions} - Return
        G0 X{x_min} Y{y_min} Z{z_min} F{xy_speed}
    {% endfor %}
    M117 Lubrication complete
    RESTORE_GCODE_STATE NAME=LUBRICATE_STATE
