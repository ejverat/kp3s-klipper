[gcode_macro CALIBRATE_X]
description: Calibrate stepper_x rotation_distance. Usage: CALIBRATE_X DESIRED=50 MEASURED=50.17
gcode:
    {% set desired = params.DESIRED|float %}
    {% set measured = params.MEASURED|float %}
    {% set old_rd = printer.configfile.settings.stepper_x.rotation_distance|float %}
    {% set new_rd = (old_rd * measured / desired)|round(3) %}
    {action_respond_info("CALIBRATE_X: Old={old_rd}, Desired={desired}, Measured={measured}, New={new_rd}")}
    M117 X: Old={old_rd} New={new_rd}
    M118 -P- Edit printer.cfg: set rotation_distance: {new_rd}


